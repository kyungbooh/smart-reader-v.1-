<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V15 Classroom</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7ff;
text-align:center;
}

h1{
margin-top:10px;
}

#reader{
font-size:110px;
margin-top:120px;
height:160px;
font-weight:bold;
}

textarea{
width:80%;
height:120px;
font-size:18px;
margin-top:20px;
}

button{
padding:10px 16px;
margin:6px;
font-size:16px;
}

.orp{
color:red;
font-weight:bold;
}

.focus{
background:black;
color:white;
}

.focus #reader{
font-size:140px;
}

#preview{
margin-top:20px;
font-size:24px;
}

#help{
margin-top:10px;
color:gray;
}

</style>

</head>

<body>

<h1>Smart Reader V15</h1>

<div id="reader">Ready</div>

<textarea id="textInput">
Yesterday / Tom / read / a book / quickly / in the library
</textarea>

<br>

<button onclick="start()">Start</button> <button onclick="pause()">Pause</button> <button onclick="stop()">Stop</button>

<button onclick="stepNext()">Next ▶</button> <button onclick="stepPrev()">◀ Prev</button>

<button onclick="preview()">Preview</button> <button onclick="focus()">Focus Mode</button>

<br><br>

Speed

<input type="range" min="400" max="4000" value="1800" id="speed">

<br><br>

<button onclick="tts()">TTS</button> <button onclick="makeQR()">QR Share</button>

<div id="preview"></div>
<div id="qrcode"></div>

<div id="help">

Keyboard
Space = Start/Pause
→ = Next
← = Previous
F = Focus
R = Reset

</div>

<script>

let chunks=[]
let index=0
let timer=null
let paused=false

function parse(){

let text=document.getElementById("textInput").value

chunks=text.split("/")

}

function ORP(word){

let mid=Math.floor(word.length/2)

return word.substring(0,mid)
+
"<span class='orp'>"
+
word[mid]
+
"</span>"
+
word.substring(mid+1)

}

function render(chunk){

let words=chunk.trim().split(" ")

let result=""

words.forEach(w=>{
result+=ORP(w)+" "
})

return result

}

function showChunk(){

if(index<0) index=0
if(index>=chunks.length) index=chunks.length-1

document.getElementById("reader").innerHTML=
render(chunks[index])

}

function run(){

if(paused) return

index++

if(index>=chunks.length){

clearInterval(timer)
return

}

showChunk()

}

function start(){

parse()

if(timer) clearInterval(timer)

index=0

showChunk()

let speed=document.getElementById("speed").value

timer=setInterval(run,speed)

paused=false

}

function pause(){

paused=true

}

function stop(){

clearInterval(timer)
timer=null
index=0
paused=false
document.getElementById("reader").innerHTML="Ready"

}

function stepNext(){

if(chunks.length===0) parse()

index++

if(index>=chunks.length) index=chunks.length-1

showChunk()

}

function stepPrev(){

if(chunks.length===0) parse()

index--

if(index<0) index=0

showChunk()

}

function preview(){

parse()

let html=""

chunks.forEach(c=>{
html+=c+"<br>"
})

document.getElementById("preview").innerHTML=html

}

function focus(){

document.body.classList.toggle("focus")

}

function tts(){

let text=document.getElementById("textInput").value.replace(/\//g," ")

let utter=new SpeechSynthesisUtterance(text)

utter.lang="en-US"

speechSynthesis.speak(utter)

}

function makeQR(){

let lesson=encodeURIComponent(document.getElementById("textInput").value)

let url=location.href.split("?")[0]+"?lesson="+lesson

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{
text:url,
width:200,
height:200
})

}

document.addEventListener("keydown",function(e){

if(e.code==="Space"){

e.preventDefault()

if(timer){

paused=!paused

}else{

start()

}

}

if(e.code==="ArrowRight"){

stepNext()

}

if(e.code==="ArrowLeft"){

stepPrev()

}

if(e.key==="f"){

focus()

}

if(e.key==="r"){

stop()

}

})

if(location.search.includes("lesson=")){

let lessonText=decodeURIComponent(location.search.split("lesson=")[1])

document.getElementById("textInput").value=lessonText

}

</script>

</body>
</html>

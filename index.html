<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V24</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f3f5f9;
}

#reader{
font-size:44px;
margin-top:120px;
padding:30px;
line-height:1.6;
}

.chunk{
padding:6px 10px;
border-radius:6px;
}

.current{
background:#ffd54f;
}

.subject{color:#1976d2;}
.verb{color:#d32f2f;}
.object{color:#388e3c;}

textarea{
width:90%;
height:140px;
font-size:16px;
}

button{
font-size:18px;
margin:6px;
padding:10px 18px;
}

</style>
</head>

<body>

<h2>Smart Reader V24</h2>

<input type="file" id="fileInput">
<button onclick="loadFile()">Upload File</button>

<br><br>

<textarea id="inputText"></textarea>

<br>

<button onclick="loadText()">Analyze</button>
<button onclick="prevChunk()">Prev</button>
<button onclick="nextChunk()">Next</button>
<button onclick="speakChunk()">TTS</button>
<button onclick="autoPlay()">Auto Play</button>
<button onclick="stopAuto()">Stop</button>

<div id="reader"></div>

<script>

let chunks=[]
let currentIndex=0
let autoTimer=null



function loadFile(){

let file=document.getElementById("fileInput").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let text=e.target.result

document.getElementById("inputText").value=text

loadText()

}

reader.readAsText(file)

}



function loadText(){

let text=document.getElementById("inputText").value

chunks=parseChunks(text)

currentIndex=0

showChunk()

}



function showChunk(){

if(chunks.length==0)return

let display=""

chunks.forEach((c,i)=>{

let cls="chunk"

if(i==currentIndex)cls+=" current"

display+=`<div class="${cls}">${c}</div>`

})

document.getElementById("reader").innerHTML=display

}



function nextChunk(){

if(currentIndex<chunks.length-1){

currentIndex++

showChunk()

}

}



function prevChunk(){

if(currentIndex>0){

currentIndex--

showChunk()

}

}



function autoPlay(){

stopAuto()

autoTimer=setInterval(()=>{

speakChunk()

nextChunk()

},3000)

}



function stopAuto(){

if(autoTimer){

clearInterval(autoTimer)

autoTimer=null

}

}



function parseChunks(text){

// 수동 chunk

if(text.includes("(한국어 번역)")){

return text.split("(한국어 번역)").map(x=>x.trim()).filter(x=>x)

}



// 전치사구 보호

text=text.replace(

/\b(about|for|with|to|from|in|on|at|by|of)\s+[^\.,;:]+/gi,

m=>"__P__"+m+"__END__"

)



// 문장부호 분리

text=text

.replace(/,/g,"\n")

.replace(/;/g,"\n")

.replace(/:/g,"\n")

.replace(/—/g,"\n")

.replace(/\./g,"\n")



text=text

.replace(/__P__/g,"")

.replace(/__END__/g,"")



let arr=text.split("\n")

let result=[]

arr.forEach(x=>{

x=x.trim()

if(x.length>0)result.push(analyzeSentence(x))

})

return result

}



function analyzeSentence(text){

// 매우 단순한 SVO 표시

let words=text.split(" ")

if(words.length<3)return text

return `<span class="subject">${words[0]}</span> 
<span class="verb">${words[1]}</span> 
<span class="object">${words.slice(2).join(" ")}</span>`

}



function prepareTTS(text){

return text

.replace(/<[^>]*>/g,"")

.replace(/[.,;:—()]/g,"")

.replace(/[가-힣]/g,"")

}



function speakChunk(){

let text=chunks[currentIndex]

let clean=prepareTTS(text)

let u=new SpeechSynthesisUtterance(clean)

let voices=speechSynthesis.getVoices()

let us=voices.find(v=>v.lang=="en-US")

if(us)u.voice=us

u.lang="en-US"

speechSynthesis.speak(u)

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V26</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f6fa;
}

#reader{
font-size:44px;
margin-top:120px;
line-height:1.6;
}

.chunk{
padding:6px;
margin:4px;
border-radius:6px;
}

.current{
background:#ffe082;
}

textarea{
width:90%;
height:150px;
font-size:16px;
}

button{
font-size:18px;
padding:10px 16px;
margin:6px;
}

</style>

</head>

<body>

<h2>Smart Reader V26</h2>

<input type="file" id="fileInput">
<button onclick="loadFile()">Upload</button>

<br><br>

<textarea id="inputText"></textarea>

<br>

<button onclick="analyze()">Analyze</button>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="speak()">TTS</button>
<button onclick="autoPlay()">Auto</button>
<button onclick="stop()">Stop</button>

<div id="reader"></div>

<script>

let chunks=[]
let index=0
let timer=null

function loadFile(){

let file=document.getElementById("fileInput").files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("inputText").value=e.target.result

}

reader.readAsText(file)

}



function analyze(){

let text=document.getElementById("inputText").value

chunks=parseChunks(text)

index=0

show()

}



function show(){

let html=""

chunks.forEach((c,i)=>{

let cls="chunk"

if(i===index) cls+=" current"

html+=`<div class="${cls}">${c}</div>`

})

document.getElementById("reader").innerHTML=html

}



function next(){

if(index<chunks.length-1){

index++

show()

}

}



function prev(){

if(index>0){

index--

show()

}

}



function autoPlay(){

stop()

timer=setInterval(()=>{

speak()

next()

},3000)

}



function stop(){

clearInterval(timer)

}



function parseChunks(text){

let chunks=[]

// -------------------
// 1 따옴표 보호
// -------------------

let quotes=[]
let qIndex=0

text=text.replace(/“[^”]+”|\"[^\"]+\"/g,function(m){

quotes.push(m)

return "__QUOTE_"+(qIndex++)+"__"

})


// -------------------
// 2 전치사구 보호
// -------------------

text=text.replace(

/\b(about|in|on|at|with|for|from|by|of)\s+[a-zA-Z\s]+/g,

m=>"__PP__"+m+"__ENDPP__"

)


// -------------------
// 3 의미구 분리
// -------------------

text=text

.replace(/, /g,"\n")

.replace(/; /g,"\n")

.replace(/: /g,"\n")

.replace(/— /g,"\n")

.replace(/\./g,"\n")


// -------------------
// 4 보호 해제
// -------------------

quotes.forEach((q,i)=>{

text=text.replace("__QUOTE_"+i+"__",q)

})

text=text

.replace(/__PP__/g,"")

.replace(/__ENDPP__/g,"")


// -------------------
// 5 배열 생성
// -------------------

text.split("\n").forEach(line=>{

line=line.trim()

if(line.length>0) chunks.push(line)

})

return chunks

}



function speak(){

let text=chunks[index]

text=text

.replace(/[.,;:—()]/g,"")

.replace(/[가-힣]/g,"")

let u=new SpeechSynthesisUtterance(text)

u.lang="en-US"

speechSynthesis.speak(u)

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Reader V21</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
margin:0;
background:#f4f6f8;
}

#reader{
font-size:40px;
margin-top:150px;
padding:40px;
line-height:1.5;
}

button{
font-size:18px;
padding:12px 20px;
margin:10px;
cursor:pointer;
}

textarea{
width:90%;
height:150px;
font-size:16px;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Smart Reader V21</h2>

<textarea id="inputText" placeholder="Paste your text here"></textarea>
<br>

<button onclick="loadText()">Load Text</button>
<button onclick="prevChunk()">Prev</button>
<button onclick="nextChunk()">Next</button>
<button onclick="speakChunk()">TTS</button>

<div id="reader"></div>

<script>

let chunks = []
let currentIndex = 0

// -------------------------------
// 텍스트 로딩
// -------------------------------

function loadText(){

let raw = document.getElementById("inputText").value

chunks = splitChunks(raw)

currentIndex = 0

showChunk()

}

// -------------------------------
// Chunk 표시
// -------------------------------

function showChunk(){

if(chunks.length === 0) return

document.getElementById("reader").innerText = chunks[currentIndex]

}

// -------------------------------
// 다음 / 이전
// -------------------------------

function nextChunk(){

if(currentIndex < chunks.length-1){

currentIndex++

showChunk()

}

}

function prevChunk(){

if(currentIndex > 0){

currentIndex--

showChunk()

}

}

// -------------------------------
// Chunk 분리
// -------------------------------

function splitChunks(text){

// 1. (한국어 번역) 기준 분리
if(text.includes("(한국어 번역)")){

return text.split("(한국어 번역)").map(x=>x.trim()).filter(x=>x)

}

// 2. / 표시 기준 분리
if(text.includes("/")){

return text.split("/").map(x=>x.trim()).filter(x=>x)

}

// 3. 자동 AI 구분 (문장부호 기반)

let temp = text
.replace(/,/g,"\n")
.replace(/;/g,"\n")
.replace(/:/g,"\n")
.replace(/—/g,"\n")
.replace(/\(/g,"\n")
.replace(/\)/g,"\n")
.replace(/\./g,"\n")

let lines = temp.split("\n")

let result = []

lines.forEach(line=>{

line=line.trim()

if(line.length>0){

result.push(line)

}

})

return result

}

// -------------------------------
// TTS 전처리 (문장부호 제거)
// -------------------------------

function prepareTextForTTS(text){

return text
.replace(/[.,;:—\-()]/g,"")
.replace(/\s+/g," ")
.trim()

}

// -------------------------------
// TTS 실행
// -------------------------------

function speakChunk(){

let text = chunks[currentIndex]

let cleaned = prepareTextForTTS(text)

let utter = new SpeechSynthesisUtterance(cleaned)

let voices = speechSynthesis.getVoices()

let usVoice = voices.find(v=>v.lang==="en-US")

if(usVoice){

utter.voice = usVoice

}

utter.lang = "en-US"

speechSynthesis.speak(utter)

}

</script>

</body>
</html>

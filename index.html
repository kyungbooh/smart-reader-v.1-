<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Smart Reader V23</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f4f8;
}

#reader{

font-size:44px;

margin-top:140px;

padding:40px;

line-height:1.6;

}

textarea{

width:90%;

height:150px;

font-size:16px;

}

button{

font-size:18px;

padding:10px 18px;

margin:6px;

}

#fullSentence{

font-size:18px;

color:#666;

margin-top:30px;

}

</style>

</head>

<body>

<h2>Smart Reader V23</h2>

<textarea id="inputText"></textarea>

<br>

<button onclick="loadText()">Load</button>

<button onclick="prevChunk()">Prev</button>

<button onclick="nextChunk()">Next</button>

<button onclick="speakChunk()">TTS</button>

<button onclick="autoPlay()">Auto Play</button>

<button onclick="stopAuto()">Stop</button>

<button onclick="showSentence()">Show Sentence</button>

<div id="reader"></div>

<div id="fullSentence"></div>

<script>

let chunks=[]
let currentIndex=0
let autoTimer=null
let originalText=""



function loadText(){

originalText=document.getElementById("inputText").value

chunks=parseChunks(originalText)

currentIndex=0

showChunk()

}



function showChunk(){

if(chunks.length==0)return

document.getElementById("reader").innerText=chunks[currentIndex]

}



function nextChunk(){

if(currentIndex<chunks.length-1){

currentIndex++

showChunk()

}

}



function prevChunk(){

if(currentIndex>0){

currentIndex--

showChunk()

}

}



function autoPlay(){

stopAuto()

autoTimer=setInterval(()=>{

speakChunk()

nextChunk()

if(currentIndex>=chunks.length-1)stopAuto()

},3000)

}



function stopAuto(){

if(autoTimer){

clearInterval(autoTimer)

autoTimer=null

}

}



function showSentence(){

document.getElementById("fullSentence").innerText=originalText

}



function parseChunks(text){

if(text.includes("(한국어 번역)")){

return text.split("(한국어 번역)").map(x=>x.trim()).filter(x=>x)

}



if(text.includes("/")){

return text.split("/").map(x=>x.trim()).filter(x=>x)

}



text=text

.replace(/\.\"/g,"__DOTQUOTE__")

.replace(/\.”/g,"__DOTQUOTE__")

.replace(/\.\'/g,"__DOTSQUOTE__")

.replace(/\.’/g,"__DOTSQUOTE__")



text=text.replace(

/\b(about|for|with|to|from|in|on|at|by|of)\s+[^\.,;:]+/gi,

m=>"__PHRASE__"+m+"__END__"

)



text=text

.replace(/,/g,"\n")

.replace(/;/g,"\n")

.replace(/:/g,"\n")

.replace(/—/g,"\n")

.replace(/\./g,"\n")



text=text

.replace(/__DOTQUOTE__/g,".\"")

.replace(/__DOTSQUOTE__/g,".'")

.replace(/__PHRASE__/g,"")

.replace(/__END__/g,"")



let arr=text.split("\n")

let result=[]

arr.forEach(x=>{

x=x.trim()

if(x.length>0)result.push(x)

})

return result

}



function prepareTTS(text){

return text

.replace(/[.,;:—()]/g,"")

.replace(/[가-힣]/g,"")

}



function speakChunk(){

let text=chunks[currentIndex]

let cleaned=prepareTTS(text)

let u=new SpeechSynthesisUtterance(cleaned)

let voices=speechSynthesis.getVoices()

let us=voices.find(v=>v.lang=="en-US")

if(us)u.voice=us

u.lang="en-US"

speechSynthesis.speak(u)

}

</script>

</body>

</html>

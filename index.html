<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V21</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f6f8;
}

h1{
color:#2c3e50;
}

#reader{
background:white;
padding:50px;
border-radius:12px;
font-size:36px;
text-align:center;
min-height:120px;
}

.kor{
font-size:22px;
color:#888;
margin-top:10px;
}

button{
margin:10px;
padding:8px 14px;
}

</style>
</head>

<body>

<h1>Smart Reader V21</h1>

<input type="file" id="fileInput">

<button onclick="toggleKor()">한글 접기/펼치기</button>

<div id="reader">파일을 업로드하세요</div>

<div>
<button onclick="prevChunk()">◀ Prev</button>
<button onclick="speakChunk()">🔊 TTS</button>
<button onclick="nextChunk()">Next ▶</button>
</div>

<script>

let chunks=[]
let current=0
let showKor=true
let voices=[]

document.getElementById("fileInput").addEventListener("change",loadFile)

function loadFile(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(){
processText(reader.result)
}

reader.readAsText(file)

}

function processText(text){

chunks=[]

let lines=text.split("\n")

lines.forEach(line=>{

line=line.trim()
if(line==="") return

// / 수동 chunk
if(line.includes("/")){

line.split("/").forEach(c=>{
chunks.push(c.trim())
})

return
}

// 괄호 번역
let match=line.match(/(.*)\((.*)\)/)

if(match){

chunks.push(match[1].trim())
chunks.push("("+match[2].trim()+")")
return

}

// punctuation 분리
let p=line
.replace(/,/g,",\n")
.replace(/;/g,";\n")
.replace(/:/g,":\n")
.replace(/\./g,".\n")
.replace(/—/g,"\n—\n")

let parts=p.split("\n")

parts.forEach(c=>{

c=c.trim()
if(c!=="") chunks.push(c)

})

})

current=0
showChunk()

}

function showChunk(){

if(chunks.length===0) return

let text=chunks[current]

let html=text

if(text.includes("(") && !showKor){

html=""

}

document.getElementById("reader").innerHTML=html

}

function nextChunk(){

if(current<chunks.length-1){

current++
showChunk()

}

}

function prevChunk(){

if(current>0){

current--
showChunk()

}

}

function toggleKor(){

showKor=!showKor
showChunk()

}

function speakChunk(){

let text=chunks[current]

text=text.replace(/\(.*?\)/g,"")

let utter=new SpeechSynthesisUtterance(text)

let voice=voices.find(v=>v.lang==="en-US")

if(voice) utter.voice=voice

speechSynthesis.speak(utter)

}

function loadVoices(){

voices=speechSynthesis.getVoices()

}

speechSynthesis.onvoiceschanged=loadVoices

</script>

</body>
</html>

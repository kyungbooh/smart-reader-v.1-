<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V16</title>

<style>

body{
font-family:Arial;
background:#f4f6ff;
text-align:center;
}

#reader{
font-size:110px;
margin-top:120px;
height:160px;
font-weight:bold;
}

textarea{
width:80%;
height:120px;
font-size:18px;
margin-top:20px;
}

button{
padding:10px 16px;
margin:6px;
font-size:16px;
}

.orp{
color:red;
font-weight:bold;
}

#preview{
margin-top:30px;
font-size:28px;
line-height:1.6;
}

</style>

</head>

<body>

<h1>Smart Reader V16</h1>

<div id="reader">Ready</div>

<textarea id="textInput">
Yesterday Tom read a book quickly in the library.
</textarea>

<br>

<button onclick="analyze()">AI Analyze</button> <button onclick="preview()">Preview</button>

<br><br>

<button onclick="start()">Start</button> <button onclick="pause()">Pause</button> <button onclick="stop()">Stop</button>

<button onclick="stepNext()">Next ▶</button> <button onclick="stepPrev()">◀ Prev</button>

<br><br>

Speed

<input type="range" min="400" max="4000" value="1800" id="speed">

<div id="preview"></div>

<script>

let chunks=[]
let index=0
let timer=null
let paused=false

function parse(){

let text=document.getElementById("textInput").value

chunks=text.split("/")

}

function ORP(word){

let mid=Math.floor(word.length/2)

return word.substring(0,mid)
+
"<span class='orp'>"
+
word[mid]
+
"</span>"
+
word.substring(mid+1)

}

function render(chunk){

let words=chunk.trim().split(" ")

let result=""

words.forEach(w=>{
result+=ORP(w)+" "
})

return result

}

function showChunk(){

if(index<0) index=0
if(index>=chunks.length) index=chunks.length-1

document.getElementById("reader").innerHTML=
render(chunks[index])

}

function run(){

if(paused) return

index++

if(index>=chunks.length){

clearInterval(timer)
return

}

showChunk()

}

function start(){

parse()

if(timer) clearInterval(timer)

index=0

showChunk()

let speed=document.getElementById("speed").value

timer=setInterval(run,speed)

paused=false

}

function pause(){

paused=true

}

function stop(){

clearInterval(timer)
timer=null
index=0
paused=false
document.getElementById("reader").innerHTML="Ready"

}

function stepNext(){

if(chunks.length===0) parse()

index++

if(index>=chunks.length) index=chunks.length-1

showChunk()

}

function stepPrev(){

if(chunks.length===0) parse()

index--

if(index<0) index=0

showChunk()

}

function analyze(){

let text=document.getElementById("textInput").value

text=text.replace(/\./g,"")

let words=text.split(" ")

let subject=words[0]

let verb=words[1]

let rest=words.slice(2).join(" ")

let obj=""
let adv=""

if(rest.includes("quickly")){

obj=rest.replace("quickly","").trim()
adv="quickly"

}else{

obj=rest

}

let chunk=subject+" / "+verb+" / "+obj

if(adv!="") chunk+=" / "+adv

document.getElementById("textInput").value=chunk

}

function rainbowColor(text){

let t=text.toLowerCase().trim()

if(["yesterday","today","tomorrow"].includes(t))
return "<span style='color:purple'>"+text+"</span>"

if(t.startsWith("in ") || t.startsWith("at ") || t.startsWith("on "))
return "<span style='color:indigo'>"+text+"</span>"

if(["quickly","slowly","carefully"].includes(t))
return "<span style='color:blue'>"+text+"</span>"

if(["read","eat","make","see","play"].includes(t))
return "<span style='color:gold'>"+text+"</span>"

if(text.split(" ").length>1 && !text.startsWith("in "))
return "<span style='color:green'>"+text+"</span>"

return "<span style='color:orange'>"+text+"</span>"

}

function preview(){

parse()

let html=""

chunks.forEach(c=>{

html+=rainbowColor(c)+"<br>"

})

document.getElementById("preview").innerHTML=html

}

</script>

</body>
</html>

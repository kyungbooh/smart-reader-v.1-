<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V17</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7ff;
text-align:center;
}

#reader{
font-size:110px;
margin-top:80px;
height:150px;
font-weight:bold;
}

textarea{
width:80%;
height:120px;
font-size:18px;
margin-top:15px;
}

button{
padding:10px 16px;
margin:5px;
font-size:15px;
}

#preview{
margin-top:30px;
font-size:28px;
line-height:1.7;
}

.orp{
color:red;
font-weight:bold;
}

.section{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Smart Reader V17</h1>

<div id="reader">Ready</div>

<div class="section">

<h3>Teacher Material Input</h3>

<textarea id="textInput">
Yesterday / Tom / read / a book / quickly / in the library
</textarea>

<br>

<input type="file" id="txtFile" accept=".txt">
<button onclick="loadTXT()">Load TXT</button>

<input type="file" id="pdfFile" accept=".pdf">
<button onclick="loadPDF()">Load PDF</button>

</div>

<div class="section">

<button onclick="preview()">Preview</button> <button onclick="analyze()">AI Analyze</button>

</div>

<div class="section">

<button onclick="start()">Start</button> <button onclick="pause()">Pause</button> <button onclick="stop()">Stop</button>

<button onclick="stepNext()">Next ▶</button> <button onclick="stepPrev()">◀ Prev</button>

</div>

Speed

<input type="range" min="400" max="4000" value="1800" id="speed">

<div id="preview"></div>

<script>

let chunks=[]
let index=0
let timer=null
let paused=false

function parse(){

let text=document.getElementById("textInput").value

chunks=text.split("/")

}

function ORP(word){

let mid=Math.floor(word.length/2)

return word.substring(0,mid)
+
"<span class='orp'>"
+
word[mid]
+
"</span>"
+
word.substring(mid+1)

}

function render(chunk){

let words=chunk.trim().split(" ")

let result=""

words.forEach(w=>{
result+=ORP(w)+" "
})

return result

}

function showChunk(){

if(index<0) index=0
if(index>=chunks.length) index=chunks.length-1

document.getElementById("reader").innerHTML=
render(chunks[index])

}

function run(){

if(paused) return

index++

if(index>=chunks.length){

clearInterval(timer)
return

}

showChunk()

}

function start(){

parse()

if(timer) clearInterval(timer)

index=0

showChunk()

let speed=document.getElementById("speed").value

timer=setInterval(run,speed)

paused=false

}

function pause(){

paused=true

}

function stop(){

clearInterval(timer)
timer=null
index=0
paused=false
document.getElementById("reader").innerHTML="Ready"

}

function stepNext(){

if(chunks.length===0) parse()

index++

if(index>=chunks.length) index=chunks.length-1

showChunk()

}

function stepPrev(){

if(chunks.length===0) parse()

index--

if(index<0) index=0

showChunk()

}

function rainbowColor(text){

let t=text.toLowerCase().trim()

if(["yesterday","today","tomorrow"].includes(t))
return "<span style='color:purple'>"+text+"</span>"

if(t.startsWith("in ") || t.startsWith("at ") || t.startsWith("on "))
return "<span style='color:indigo'>"+text+"</span>"

if(["quickly","slowly","carefully"].includes(t))
return "<span style='color:blue'>"+text+"</span>"

if(["read","eat","make","see","play"].includes(t))
return "<span style='color:gold'>"+text+"</span>"

if(text.split(" ").length>1 && !text.startsWith("in "))
return "<span style='color:green'>"+text+"</span>"

return "<span style='color:orange'>"+text+"</span>"

}

function preview(){

parse()

let html=""

chunks.forEach(c=>{

html+=rainbowColor(c)+"<br>"

})

document.getElementById("preview").innerHTML=html

}

function analyze(){

let text=document.getElementById("textInput").value

text=text.replace(/\./g,"")

let words=text.split(" ")

if(words.length<3) return

let subject=words[0]

let verb=words[1]

let rest=words.slice(2).join(" ")

let chunk=subject+" / "+verb+" / "+rest

document.getElementById("textInput").value=chunk

}

function loadTXT(){

let file=document.getElementById("txtFile").files[0]

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("textInput").value=e.target.result

}

reader.readAsText(file)

}

async function loadPDF(){

const file=document.getElementById("pdfFile").files[0]

const arrayBuffer=await file.arrayBuffer()

const pdf=await pdfjsLib.getDocument(arrayBuffer).promise

const page=await pdf.getPage(1)

const textContent=await page.getTextContent()

let text=""

textContent.items.forEach(item=>{
text+=item.str+" "
})

document.getElementById("textInput").value=text

}

</script>

</body>
</html>

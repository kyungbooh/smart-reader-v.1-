<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V21</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f6f8;
}

h1{
color:#2c3e50;
}

button{
margin:5px;
padding:8px 14px;
font-size:14px;
cursor:pointer;
}

#display{
margin:40px 0;
background:white;
padding:40px;
border-radius:10px;
min-height:120px;
text-align:center;
}

.chunk{
font-size:36px;
line-height:1.6;
color:#2c3e50;
}

.korean{
margin-top:15px;
font-size:22px;
color:#888;
}

</style>
</head>

<body>

<h1>Smart Reader V21 (Chunk Mode)</h1>

<input type="file" id="fileInput">
<button onclick="deleteFile()">파일 삭제</button>

<hr>

<div>
Chunk <span id="counter"></span>
</div>

<div id="display">
파일을 업로드하세요
</div>

<button onclick="toggleKorean()">한글 접기/펼치기</button>

<hr>

<select id="voiceSelect"></select>
<button onclick="speakChunk()">TTS 읽기</button>

<hr>

<button onclick="prevChunk()">이전 Chunk</button>
<button onclick="nextChunk()">다음 Chunk</button>

<hr>

<button onclick="downloadChunks()">Chunk TXT 저장</button>

<script>

let chunks=[];
let currentIndex=0;
let voices=[];
let showKorean=true;

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(event){

parseText(event.target.result);

};

reader.readAsText(file);

});


function parseText(text){

chunks=[];

let lines=text
.split(/\n+/)
.map(l=>l.trim())
.filter(l=>l.length>0);

lines.forEach(line=>{

let parts=line.split("/");

parts.forEach(p=>{
let c=p.trim();
if(c.length>0) chunks.push(c);
});

});

currentIndex=0;

showChunk();

}


function showChunk(){

if(chunks.length===0) return;

let chunk=chunks[currentIndex];

let koreanMatch=
chunk.match(/\(([^)]*[가-힣][^)]*)\)/);

let english=chunk;
let korean="";

if(koreanMatch){

korean=koreanMatch[0];
english=chunk.replace(koreanMatch[0],"");

}

let html="<div class='chunk'>"+english.trim()+"</div>";

if(showKorean && korean){

html+="<div class='korean'>"+korean+"</div>";

}

document.getElementById("display").innerHTML=html;

document.getElementById("counter").innerText=
(currentIndex+1)+" / "+chunks.length;

}


function nextChunk(){

if(currentIndex < chunks.length-1){

currentIndex++;
showChunk();

}

}

function prevChunk(){

if(currentIndex>0){

currentIndex--;
showChunk();

}

}


function toggleKorean(){

showKorean=!showKorean;

showChunk();

}


function removeKorean(text){

return text
.replace(/\([^)]*[가-힣][^)]*\)/g,"")
.replace(/[ㄱ-ㅎㅏ-ㅣ가-힣]/g,"");

}


function speakChunk(){

let text=removeKorean(chunks[currentIndex]);

const utter=new SpeechSynthesisUtterance(text);

const voiceIndex=
document.getElementById("voiceSelect").value;

utter.voice=voices[voiceIndex];

speechSynthesis.speak(utter);

}


function loadVoices(){

voices=speechSynthesis
.getVoices()
.filter(v=>v.lang==="en-US");

let select=document.getElementById("voiceSelect");

select.innerHTML="";

voices.forEach((v,i)=>{

let option=document.createElement("option");

option.value=i;
option.text=v.name+" (US)";

select.appendChild(option);

});

}

speechSynthesis.onvoiceschanged=loadVoices;


function deleteFile(){

chunks=[];
currentIndex=0;

document.getElementById("display").innerHTML=
"파일이 삭제되었습니다.";

document.getElementById("counter").innerText="";

}


function downloadChunks(){

let content=chunks.join("\n");

const blob=new Blob([content],{type:"text/plain"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="chunk_text.txt";

a.click();

}

</script>

</body>
</html>

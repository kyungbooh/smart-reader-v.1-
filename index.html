<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Reader V19</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f6f8;
}

h1{
color:#2c3e50;
}

button{
margin:5px;
padding:8px 14px;
font-size:14px;
cursor:pointer;
}

#sentenceDisplay{
margin:20px 0;
background:white;
padding:20px;
border-radius:8px;
min-height:80px;
line-height:1.6;
}

.chunk{
padding:6px;
margin:6px 0;
background:#e8f0fe;
border-radius:6px;
font-size:22px;
}

textarea{
font-size:18px;
}

</style>
</head>

<body>

<h1>Smart Reader V19</h1>

<input type="file" id="fileInput">
<button onclick="deleteFile()">파일 삭제</button>

<hr>

<div>
문장 <span id="counter"></span>
</div>

<div id="sentenceDisplay">
TXT 파일을 업로드하세요
</div>

<button onclick="editSentence()">편집</button>
<button onclick="saveSentence()">저장</button>

<hr>

<select id="voiceSelect"></select>

<button onclick="speakSentence()">문장 TTS</button>
<button onclick="speakChunks()">청크 TTS</button>

<hr>

<button onclick="prevSentence()">이전 문장</button>
<button onclick="nextSentence()">다음 문장</button>

<hr>

<button onclick="copySlide()">PPT 복사용 복사</button>
<button onclick="downloadFile()">수정 TXT 저장</button>

<script>

let sentences=[];
let currentIndex=0;
let voices=[];

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(event){

const text=event.target.result;

sentences=text
.split(/\n+/)
.map(s=>s.trim())
.filter(s=>s.length>0);

currentIndex=0;

showSentence();

};

reader.readAsText(file);

});


function formatChunks(sentence){

let chunks=sentence.split("/");

return chunks.map(c =>
"<div class='chunk'>"+c.trim()+"</div>"
).join("");

}


function showSentence(){

if(sentences.length==0) return;

const display=document.getElementById("sentenceDisplay");

display.innerHTML=formatChunks(sentences[currentIndex]);

document.getElementById("counter").innerText=
(currentIndex+1)+" / "+sentences.length;

}


function nextSentence(){

if(currentIndex < sentences.length-1){

currentIndex++;
showSentence();

}

}


function prevSentence(){

if(currentIndex > 0){

currentIndex--;
showSentence();

}

}


function editSentence(){

const display=document.getElementById("sentenceDisplay");

display.innerHTML=
`<textarea id="editor" rows="5" style="width:100%">
${sentences[currentIndex]}
</textarea>`;

}


function saveSentence(){

const newText=document.getElementById("editor").value;

sentences[currentIndex]=newText;

showSentence();

}


function deleteFile(){

sentences=[];
currentIndex=0;

document.getElementById("sentenceDisplay").innerHTML=
"파일이 삭제되었습니다.";

document.getElementById("counter").innerText="";

}


function downloadFile(){

const content=sentences.join("\n");

const blob=new Blob([content],{type:"text/plain"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="edited_text.txt";

a.click();

}


function loadVoices(){

voices=speechSynthesis.getVoices();

const select=document.getElementById("voiceSelect");

select.innerHTML="";

voices.forEach((voice,i)=>{

const option=document.createElement("option");

option.value=i;
option.text=voice.name+" ("+voice.lang+")";

select.appendChild(option);

});

}

speechSynthesis.onvoiceschanged=loadVoices;


function speakSentence(){

if(sentences.length==0) return;

const utter=new SpeechSynthesisUtterance(sentences[currentIndex]);

const voiceIndex=document.getElementById("voiceSelect").value;

utter.voice=voices[voiceIndex];

speechSynthesis.speak(utter);

}


function speakChunks(){

let chunks=sentences[currentIndex].split("/");

let i=0;

function speakNext(){

if(i>=chunks.length) return;

let utter=new SpeechSynthesisUtterance(chunks[i]);

utter.voice=voices[
document.getElementById("voiceSelect").value
];

utter.onend=function(){
i++;
speakNext();
};

speechSynthesis.speak(utter);

}

speakNext();

}


function copySlide(){

let text=sentences[currentIndex]
.split("/")
.join("\n");

navigator.clipboard.writeText(text);

alert("슬라이드용 텍스트 복사 완료");

}

</script>

</body>
</html>
